<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-grid"></div>

  <div class="container">

    <header>
      <div class="header-badge">📚 Study Planner</div>
      <h1>Твої навчальні<br><span class="accent">завдання</span></h1>
      <p class="subtitle">Плануй, виконуй, досягай</p>
    </header>

    <div class="main-grid">

      <aside class="sidebar">

        <section class="card task-form">
          <h2>Нове завдання</h2>
          <div class="field">
            <label for="title">Назва</label>
            <input type="text" id="title" placeholder="Напр. Написати реферат">
          </div>
          <div class="field">
            <label for="subject">Предмет</label>
            <input type="text" id="subject" placeholder="Напр. Математика">
          </div>
          <div class="field">
            <label for="deadline">Дедлайн</label>
            <input type="date" id="deadline">
          </div>
          <div class="field">
            <label for="priority">Пріоритет</label>
            <select id="priority">
              <option value="low">🟢 Низький</option>
              <option value="medium" selected>🟡 Середній</option>
              <option value="high">🔴 Високий</option>
            </select>
          </div>
          <button id="addTaskBtn"><span>+</span> Додати завдання</button>
        </section>

        <section class="card filters-card">
          <h2>Фільтр</h2>
          <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">Усі</button>
            <button class="filter-btn" data-filter="active">Активні</button>
            <button class="filter-btn" data-filter="completed">Виконані</button>
          </div>
          <h2 style="margin-top:20px;">Сортування</h2>
          <div class="filter-buttons">
            <button class="sort-btn active" data-sort="date-added">За датою</button>
            <button class="sort-btn" data-sort="priority">За пріоритетом</button>
            <button class="sort-btn" data-sort="deadline">За дедлайном</button>
          </div>
        </section>

        <section class="card stats-card">
          <h2>Статистика</h2>
          <div class="stats-grid">
            <div class="stat-item">
              <span class="stat-number" id="totalTasks">0</span>
              <span class="stat-label">Всього</span>
            </div>
            <div class="stat-item completed-stat">
              <span class="stat-number" id="completedTasks">0</span>
              <span class="stat-label">Виконано</span>
            </div>
            <div class="stat-item active-stat">
              <span class="stat-number" id="activeTasks">0</span>
              <span class="stat-label">Активних</span>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="progress-label" id="progressLabel">0%</span>
          </div>
        </section>

      </aside>

      <main class="task-main">
        <div class="task-list-header">
          <h2>Список завдань</h2>
          <span id="taskCount" class="task-count-badge">0</span>
        </div>
        <div id="taskList">
          <div class="empty-state">
            <div class="empty-icon">🎯</div>
            <p>Тут з'являться твої завдання</p>
            <span>Додай перше завдання зліва →</span>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
